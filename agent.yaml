name: perf-optimizer
display_name: Performance Optimizer
version: 0.2.0
description: >
  Karpathy-style iterative performance optimizer. Conversational — answers
  questions about your code. When asked to optimize, loops autonomously:
  edit → test → keep/revert → report → next. Streams tool uses in real-time.
category: coding
tags: [performance, optimization, autonomous, testing]
author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  resources:
    max_time: "1h"

permissions:
  filesystem:
    workspace: readwrite
  network:
    - domain: api.anthropic.com
      reason: LLM inference for code analysis and optimization

keys:
  - provider: anthropic
    domain: api.anthropic.com
    auth_style: x-api-key
